<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="What's Not Working">
<meta name="theme-color" content="#f5f0e8">
<link rel="manifest" href="manifest.json">
<title>What's Not Working?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --card: #ffffff;
    --text: #1a1a2e;
    --text-muted: #6b6b80;
    --border: #e0d9ce;
    --accent: #3b5bdb;
    --accent-light: #e8edff;
    --green: #2f9e44;
    --green-light: #ebfbee;
    --orange: #e67700;
    --orange-light: #fff3bf;
    --red: #c92a2a;
    --red-light: #fff5f5;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
    --radius: 18px;
    --radius-sm: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Nunito Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    overscroll-behavior: none;
  }

  #app {
    max-width: 500px;
    margin: 0 auto;
    padding: 0;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* ── TOP BAR ── */
  .topbar {
    background: var(--bg);
    padding: 52px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 10;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s;
  }
  .topbar.scrolled { border-color: var(--border); }
  .topbar-inner { display: flex; align-items: center; gap: 10px; }
  .back-btn {
    width: 40px; height: 40px;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 18px;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }
  .back-btn:active { transform: scale(0.92); background: var(--border); }
  .topbar-title {
    font-family: 'Nunito', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
  }

  /* ── SCREENS ── */
  .screen { display: none; flex-direction: column; flex: 1; animation: fadeIn 0.2s ease; }
  .screen.active { display: flex; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* ── HOME ── */
  #screen-home {
    padding: 0;
  }
  .home-header {
    padding: 56px 24px 28px;
    background: linear-gradient(160deg, #1a1a2e 0%, #2d3561 100%);
    color: white;
    position: relative;
    overflow: hidden;
  }
  .home-header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 200px; height: 200px;
    background: rgba(255,255,255,0.04);
    border-radius: 50%;
  }
  .home-header::after {
    content: '';
    position: absolute;
    bottom: -60px; left: -20px;
    width: 160px; height: 160px;
    background: rgba(255,255,255,0.03);
    border-radius: 50%;
  }
  .home-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 99px;
    padding: 5px 12px;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 14px;
    color: rgba(255,255,255,0.9);
  }
  .home-header h1 {
    font-family: 'Nunito', sans-serif;
    font-size: 32px;
    font-weight: 800;
    line-height: 1.15;
    margin-bottom: 8px;
    position: relative; z-index: 1;
  }
  .home-header p {
    font-size: 17px;
    color: rgba(255,255,255,0.7);
    position: relative; z-index: 1;
  }

  .devices-section { padding: 20px 16px 32px; }
  .devices-section h2 {
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 12px;
    padding-left: 4px;
  }
  .device-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .device-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 16px 18px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }
  .device-card:active { transform: scale(0.96); box-shadow: none; }
  .device-card.full-width { grid-column: 1 / -1; flex-direction: row; justify-content: flex-start; padding: 18px 20px; }
  .device-card.full-width .device-label { font-size: 20px; }
  .device-icon-wrap {
    width: 72px; height: 72px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 16px;
    background: var(--bg);
    flex-shrink: 0;
  }
  .device-card.full-width .device-icon-wrap { width: 60px; height: 60px; }
  .device-label {
    font-family: 'Nunito', sans-serif;
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    text-align: center;
  }
  .device-card.full-width .device-label { text-align: left; }
  .device-chevron {
    margin-left: auto;
    color: var(--text-muted);
    font-size: 20px;
  }

  /* ── ISSUES ── */
  #screen-issues { padding-bottom: 24px; }
  .issues-body { padding: 16px; display: flex; flex-direction: column; gap: 10px; flex: 1; }
  .issue-row {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 16px 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: var(--shadow);
    transition: transform 0.12s, box-shadow 0.12s;
  }
  .issue-row:active { transform: scale(0.97); box-shadow: none; }
  .issue-icon { font-size: 26px; flex-shrink: 0; }
  .issue-text { flex: 1; }
  .issue-text strong { display: block; font-size: 18px; font-weight: 700; color: var(--text); font-family: 'Nunito', sans-serif; }
  .issue-text span { font-size: 14px; color: var(--text-muted); }
  .issue-arrow { color: var(--text-muted); font-size: 18px; }

  .not-found-row {
    background: var(--orange-light);
    border: 1.5px solid #ffe066;
    border-radius: var(--radius-sm);
    padding: 16px 18px;
    cursor: pointer;
    display: flex; align-items: center; gap: 14px;
    transition: transform 0.12s;
    margin-top: 4px;
  }
  .not-found-row:active { transform: scale(0.97); }
  .not-found-row strong { font-size: 18px; font-weight: 700; color: #7d5a00; font-family: 'Nunito', sans-serif; }

  .call-son-box {
    background: var(--green-light);
    border: 2px solid #69db7c;
    border-radius: var(--radius);
    padding: 24px 20px;
    margin: 0 16px 16px;
    text-align: center;
    animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .call-son-box .cs-icon { font-size: 52px; display: block; margin-bottom: 10px; }
  .call-son-box h3 { font-family: 'Nunito', sans-serif; font-size: 26px; font-weight: 800; color: #1a6b2f; }
  .call-son-box p { font-size: 16px; color: #2d8f48; margin-top: 4px; }

  /* ── STEPS ── */
  #screen-steps { padding-bottom: 100px; }
  .steps-body { padding: 16px; flex: 1; }

  .progress-wrap { padding: 12px 16px 0; }
  .progress-label { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-muted); margin-bottom: 8px; font-weight: 600; }
  .progress-track { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-bar { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); }

  .step-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow-lg);
    margin-bottom: 16px;
  }
  .step-visual {
    width: 100%;
    min-height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px 20px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .step-visual svg { max-width: 100%; height: auto; }
  .step-body { padding: 20px 20px 22px; }
  .step-num {
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }
  .step-text {
    font-size: 20px;
    line-height: 1.55;
    color: var(--text);
    font-weight: 600;
    font-family: 'Nunito', sans-serif;
  }

  .done-card {
    background: linear-gradient(135deg, #ebfbee, #d3f9d8);
    border: 2px solid #69db7c;
    border-radius: var(--radius);
    padding: 36px 24px;
    text-align: center;
    box-shadow: var(--shadow-lg);
    animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .done-card .done-icon { font-size: 64px; display: block; margin-bottom: 12px; }
  .done-card h3 { font-family: 'Nunito', sans-serif; font-size: 26px; font-weight: 800; color: #1a6b2f; }
  .done-card p { font-size: 17px; color: #2d8f48; margin-top: 8px; line-height: 1.5; }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 500px;
    background: rgba(245,240,232,0.92);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    display: none;
    gap: 10px;
    z-index: 20;
  }
  .bottom-nav.visible { display: flex; }
  .nav-btn {
    flex: 1;
    padding: 15px;
    border-radius: var(--radius-sm);
    font-size: 18px;
    font-weight: 700;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    border: 1.5px solid var(--border);
    transition: transform 0.12s, background 0.12s;
  }
  .nav-btn:active { transform: scale(0.96); }
  .nav-btn.secondary { background: var(--card); color: var(--text); }
  .nav-btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
  .nav-btn.primary:active { background: #2f4ccc; }
  .nav-btn.success { background: var(--green); color: white; border-color: var(--green); }
</style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <div class="home-header">
      <div class="home-badge">🔧 Tech Helper</div>
      <h1>What's Not Working?</h1>
      <p>Tap the device giving you trouble</p>
    </div>
    <div class="devices-section">
      <h2>Your Devices</h2>
      <div class="device-grid">
        <div class="device-card" onclick="selectDevice('appletv')">

              <!-- Apple TV box -->
              <rect x="6" y="28" width="40" height="14" rx="4" fill="#1c1c1e"/>
              <rect x="10" y="32" width="32" height="6" rx="2" fill="#2c2c2e"/>
              <circle cx="26" cy="35" r="2" fill="#48484a"/>

              <circle cx="38" cy="33" r="1.5" fill="#30d158"/>
              <!-- TV screen above -->
              <rect x="4" y="8" width="44" height="28" rx="3" fill="#1c1c1e" opacity="0.15"/>

            </svg>
          </div>
          <span class="device-label">Apple TV</span>
        </div>

        <div class="device-card" onclick="selectDevice('wifi')">
          <div class="device-icon-wrap">

          </div>
          <span class="device-label">Wi-Fi Router</span>

        <div class="device-card" onclick="selectDevice('iphone')">
          <div class="device-icon-wrap">

              <!-- Phone body -->
              <rect x="1" y="1" width="40" height="56" rx="9" fill="#1c1c1e"/>

              <rect x="15" y="48" width="12" height="2.5" rx="1.25" fill="#48484a"/>
              <!-- Side buttons -->
              <rect x="-1" y="15" width="2" height="8" rx="1" fill="#48484a"/>
              <rect x="-1" y="25" width="2" height="6" rx="1" fill="#48484a"/>
              <rect x="41" y="18" width="2" height="10" rx="1" fill="#48484a"/>
            </svg>
          </div>
          <span class="device-label">iPhone / iPad</span>
        </div>

        <div class="device-card" onclick="selectDevice('ring')">
          <div class="device-icon-wrap">
            <svg width="44" height="56" viewBox="0 0 44 56" fill="none" xmlns="http://www.w3.org/2000/svg">
              <!-- Ring doorbell body -->
              <rect x="4" y="4" width="36" height="48" rx="8" fill="#1c1c1e"/>
              <rect x="6" y="6" width="32" height="44" rx="7" fill="#2c2c2e"/>

              <rect x="9" y="10" width="26" height="20" rx="4" fill="#1a1a2e"/>

              <circle cx="22" cy="20" r="5" fill="#1a1a2e"/>
              <circle cx="22" cy="20" r="3" fill="#222d45"/>
              <circle cx="20.5" cy="18.5" r="1" fill="rgba(255,255,255,0.3)"/>
              <!-- Ring logo -->
              <circle cx="22" cy="37" r="6" fill="#1c1c1e" stroke="#1c6ead" stroke-width="2"/>
              <circle cx="22" cy="37" r="3.5" fill="#1c6ead"/>
              <!-- Motion light -->
              <circle cx="33" cy="12" r="2" fill="#ffa500" opacity="0.8"/>
            </svg>
          </div>
          <span class="device-label">Ring Camera</span>
        </div>

        <div class="device-card full-width" onclick="selectDevice('nest')">
          <div class="device-icon-wrap">
            <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
              <!-- Nest circle body -->
              <circle cx="26" cy="26" r="24" fill="#1c1c1e"/>
              <circle cx="26" cy="26" r="21" fill="#222"/>
              <!-- Screen ring -->
              <circle cx="26" cy="26" r="18" fill="#1a2a1a" stroke="#30d158" stroke-width="1.5"/>

              <text x="26" y="24" text-anchor="middle" font-family="Helvetica, sans-serif" font-size="9" font-weight="bold" fill="#ffffff">72°</text>
              <text x="26" y="33" text-anchor="middle" font-family="Helvetica, sans-serif" font-size="5" fill="#30d158">COOLING</text>
              <!-- Outer ring accent -->
              <circle cx="26" cy="26" r="23" fill="none" stroke="#30d158" stroke-width="1" stroke-dasharray="3 4" opacity="0.4"/>
            </svg>
          </div>
          <span class="device-label">Nest Thermostat</span>
          <span class="device-chevron">›</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ISSUES -->
  <div class="screen" id="screen-issues">
    <div class="topbar">
      <div class="topbar-inner">
        <div class="back-btn" onclick="goHome()">←</div>
        <span class="topbar-title" id="issues-title">What's wrong?</span>
      </div>
    </div>
    <div class="issues-body" id="issue-list"></div>
    <div id="call-son-box" style="display:none;"></div>
  </div>

  <!-- STEPS -->
  <div class="screen" id="screen-steps">
    <div class="topbar">
      <div class="topbar-inner">
        <div class="back-btn" onclick="goBack()">←</div>
        <span class="topbar-title" id="steps-title">Fixing it...</span>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-label">
        <span id="progress-label">Step 1</span>
        <span id="progress-count"></span>
      </div>
      <div class="progress-track"><div class="progress-bar" id="progress-bar"></div></div>
    </div>
    <div class="steps-body" id="step-container"></div>
  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav" id="bottom-nav">
    <button class="nav-btn secondary" id="btn-prev" onclick="prevStep()">← Back</button>
    <button class="nav-btn primary" id="btn-next" onclick="nextStep()">Next →</button>
  </div>
</div>

          { text: "On the Nest display, press the ring and go to Settings → Network to see if your Wi-Fi is listed.", svg: SVGs.nest_display },
          { text: "If needed, go to Settings → Network and reconnect to your home Wi-Fi. You'll need the Wi-Fi password.", svg: SVGs.nest_wifi },
        ]
      },
      { label: "App not showing thermostat", hint: "Nest missing from Google Home", icon: "📱",
        steps: [
          { text: "Open the Google Home app. Make sure you're signed into the same Google account used to set up your Nest.", svg: SVGs.iphone_settings },
          { text: "Close the app completely and reopen it. On iPhone: swipe up from the bottom, swipe the app away, then reopen.", svg: SVGs.restart },
          { text: "Check your phone's internet connection — try opening a website to confirm Wi-Fi is working.", svg: SVGs.wifi_full },
          { text: "If the Nest shows 'offline' in the app, follow the 'Says Offline' guide — the Nest may have lost Wi-Fi.", svg: SVGs.nest_wifi },
        ]
      },
    ]
  }
};

// ── STATE ──
let currentDevice = null;
let currentSteps = [];
let currentStep = 0;

function goHome() {
  showScreen('home');
  document.getElementById('bottom-nav').classList.remove('visible');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  window.scrollTo(0, 0);
}

function selectDevice(id) {
  currentDevice = id;
  const dev = DATA[id];
  document.getElementById('issues-title').textContent = dev.label;
  const list = document.getElementById('issue-list');
  list.innerHTML = '';
  document.getElementById('call-son-box').style.display = 'none';

  dev.issues.forEach((issue, i) => {
    const row = document.createElement('div');
    row.className = 'issue-row';
    row.innerHTML = `<span class="issue-icon">${issue.icon}</span>
      <div class="issue-text"><strong>${issue.label}</strong><span>${issue.hint || ''}</span></div>
      <span class="issue-arrow">›</span>`;
    row.onclick = () => selectIssue(i);
    list.appendChild(row);
  });

  const notFound = document.createElement('div');
  notFound.className = 'not-found-row';
  notFound.innerHTML = `<span style="font-size:24px">🤷</span><strong>My issue isn't listed here</strong>`;
  notFound.onclick = showCallSon;
  list.appendChild(notFound);

  document.getElementById('bottom-nav').classList.remove('visible');
  showScreen('issues');
}

function selectIssue(index) {
  const issue = DATA[currentDevice].issues[index];
  currentSteps = issue.steps;
  currentStep = 0;
  document.getElementById('steps-title').textContent = issue.label;
  renderStep();
  document.getElementById('bottom-nav').classList.add('visible');
  showScreen('steps');
}

function renderStep() {
  const total = currentSteps.length;
  const pct = Math.min(((currentStep + 1) / total) * 100, 100);

  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-label').textContent = currentStep >= total ? 'All done!' : `Step ${currentStep + 1} of ${total}`;
  document.getElementById('progress-count').textContent = `${Math.min(currentStep + 1, total)} / ${total}`;

  const container = document.getElementById('step-container');

  if (currentStep >= total) {
    container.innerHTML = `<div class="done-card">
      <span class="done-icon">✅</span>
      <h3>Hopefully that fixed it!</h3>
      <p>If it's still not working, tap ← Back and try a different option — or call your son! 😄</p>
    </div>`;
    document.getElementById('btn-next').textContent = 'Start Over';
    document.getElementById('btn-next').className = 'nav-btn success';
    document.getElementById('btn-prev').style.display = 'none';
    return;
  }

  const step = currentSteps[currentStep];
  document.getElementById('btn-next').textContent = currentStep === total - 1 ? 'Finish ✓' : 'Next →';
  document.getElementById('btn-next').className = 'nav-btn primary';
  document.getElementById('btn-prev').style.display = currentStep === 0 ? 'none' : '';

  container.innerHTML = `<div class="step-card">
    <div class="step-visual">${step.svg || ''}</div>
    <div class="step-body">
      <div class="step-num">Step ${currentStep + 1} of ${total}</div>
      <div class="step-text">${step.text}</div>
    </div>
  </div>`;
}

function nextStep() {
  if (currentStep >= currentSteps.length) { goHome(); return; }
  currentStep++;
  renderStep();
  document.querySelector('#screen-steps').scrollTop = 0;
  window.scrollTo(0, 0);
}

function prevStep() {
  if (currentStep > 0) { currentStep--; renderStep(); }
}

function goBack() {
  document.getElementById('bottom-nav').classList.remove('visible');
  showScreen('issues');
}

function showCallSon() {
  const box = document.getElementById('call-son-box');
  if (box.style.display !== 'none') { box.style.display = 'none'; return; }
  box.style.display = 'block';
  box.innerHTML = `<div class="call-son-box">
    <span class="cs-icon">📞</span>
    <h3>Call your son!</h3>
    <p>He'll know exactly what to do 😊</p>
  </div>`;
  box.scrollIntoView({ behavior: 'smooth' });
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>
